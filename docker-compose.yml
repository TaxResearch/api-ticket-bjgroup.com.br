# API NestJS — banco configurado via DATABASE_URL no .env
#
#   docker compose up -d
#
# Porta: o container escuta em PORT (.env, padrao 3001) e e publicado em
# 127.0.0.1:HOST_PORT (.env, padrao 3099). O Plesk faz proxy reverso de
# apiticket.bjgroup.com.br -> http://127.0.0.1:${HOST_PORT:-3099}
# Se a HOST_PORT tambem estiver ocupada, defina outra livre no .env.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-bjgroup-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-3099}:${PORT:-3099}"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||3099;fetch(`http://127.0.0.1:$${p}/api`).then(r=>process.exit(r.ok||r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
