# Stack local: API NestJS + MySQL
#
# Banco externo (ex.: 10.68.0.30): mantenha DATABASE_URL no .env e suba só a API:
#   docker compose up -d api
#
# Stack completa com MySQL no Docker: ajuste o .env para host "mysql" e suba tudo:
#   docker compose --profile with-db up -d
#
# API: http://localhost:3001/api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-bjgroup-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api').then(r=>process.exit(r.ok||r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    profiles:
      - with-db
    image: mysql:8.4
    container_name: ticket-bjgroup-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DATABASE_NAME:-DevDeck}
      MYSQL_USER: ${DATABASE_USER:-ticket}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-ticket}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  uploads_data:
  mysql_data:
