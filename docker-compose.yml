# API NestJS — banco configurado via DATABASE_URL no .env
#
#   docker compose up -d
#
# API: http://localhost:${PORT:-3099}/api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-bjgroup-api
    restart: unless-stopped
    ports:
      - "${PORT:-3099}:${PORT:-3099}"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||3099;fetch(`http://127.0.0.1:${p}/api`).then(r=>process.exit(r.ok||r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
